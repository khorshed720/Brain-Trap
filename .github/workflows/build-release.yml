name: Build Release APK and AAB

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Sign Release Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'

      - name: Prepare Signing Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            echo "⚠️ No RELEASE_KEYSTORE_BASE64 secret found. Falling back to debug keystore for release artifact generation."
          fi

      - name: Build Release APK and AAB
        env:
          KEYSTORE_PATH: "../my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease bundleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: BrainTrap-Release-APK
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB (Android App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: BrainTrap-Release-AAB
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release (If Tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
